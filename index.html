// Safe localStorage wrappers — fail silently if storage is disabled
// (some corporate devices, private browsing, etc.).
const LS_RATINGS = 'lfhs_brief_ratings_v1';
const LS_BOOKMARKS = 'lfhs_brief_bookmarks_v1';

function lsGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* noop */ }
}

// Stable ID for an insight within a brief. Enables rating lookups.
const insightId = (weekId, verticalId, idx) => `${weekId}::${verticalId}::${idx}`;

// Build a full snapshot of an insight for bookmarks. Snapshots let
// bookmarks survive even if the original brief rotates out of archive.
const buildBookmarkSnapshot = (brief, verticalId, idx, insight) => {
  const meta = VERTICALS_META.find(v => v.id === verticalId);
  return {
    id: insightId(brief.id, verticalId, idx),
    weekId: brief.id,
    weekShort: brief.weekShort,
    weekIssue: brief.issue,
    verticalId,
    verticalName: meta ? meta.name : verticalId,
    verticalAbbr: meta ? meta.abbr : '',
    headline: insight.headline,
    context: insight.context,
    tags: insight.tags,
    implication: insight.implication,
    conversation: insight.conversation,
    source: insight.source,
    sourceUrl: insight.sourceUrl,
    savedAt: Date.now(),
  };
};

function Tag({ label, invert }) {
  // Theme pill: outlined ink chip. `invert` flips to white-on-dark for priority cards.
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      padding: '3px 9px', fontSize: 9, fontWeight: 700,
      letterSpacing: '0.10em', textTransform: 'uppercase', lineHeight: 1,
      fontFamily: FONT_BODY,
      color: invert ? C.onPriority : C.ink,
      background: 'transparent',
      border: `1.5px solid ${invert ? C.onPriorityLine : C.ink}`,
      borderRadius: 999,
    }}>{label}</span>
  );
}

// -------------------- INSIGHT TILE (flips on full-card click) --------------------
// Plausible custom event helper — fires only when Plausible script loaded; no-op otherwise
const trackEvent = (name, props) => {
  try { if (typeof window !== 'undefined' && window.plausible) window.plausible(name, { props }); } catch (e) { /* noop */ }
};

function InsightTile({ insight, insightIdStr, bookmarked, rating, onBookmark, onRate, weekBadge, onUnsave, disableFlip }) {
  const [flipped, setFlipped] = useState(false);
  // `priority` (or `highlight`) opt-in flag on the insight renders the red-dark
  // "win / highlight" treatment per theme. Default off — nothing renders priority
  // unless the data sets it explicitly.
  const priority = !!(insight.priority || insight.highlight);

  const toggleFlip = (e) => {
    if (e) e.stopPropagation();
    setFlipped(f => {
      const next = !f;
      // Track flip-open events (not flip-close) to measure read-through intent
      if (next) trackEvent('Tile Flip', { headline: insight.headline.slice(0, 80), vertical: insightIdStr.split('::')[1] || 'unknown' });
      return next;
    });
  };
  const openSource = (e) => {
    e.stopPropagation();
    trackEvent('Source Click', { headline: insight.headline.slice(0, 80), source: insight.source || 'unknown' });
    window.open(insight.sourceUrl, '_blank', 'noopener,noreferrer');
  };
  const handleBookmark = (e) => {
    e.stopPropagation();
    trackEvent(bookmarked ? 'Bookmark Remove' : 'Bookmark Add', { headline: insight.headline.slice(0, 80), vertical: insightIdStr.split('::')[1] || 'unknown' });
    if (onBookmark) onBookmark(insightIdStr);
  };
  const handleRate = (e, value) => {
    e.stopPropagation();
    trackEvent(value === 'up' ? 'Rated Useful' : 'Rated Not Useful', { headline: insight.headline.slice(0, 80), vertical: insightIdStr.split('::')[1] || 'unknown' });
    if (onRate) onRate(insightIdStr, value);
  };
  const handleUnsave = (e) => {
    e.stopPropagation();
    trackEvent('Bookmark Remove', { headline: insight.headline.slice(0, 80), source: 'saved-view' });
    if (onUnsave) onUnsave(insightIdStr);
  };

  const isBookmarked = !!bookmarked;

  // -------- Theme surface treatments --------
  const faceBase = {
    borderRadius: 15,
    padding: '18px 18px 18px',
    display: 'flex', flexDirection: 'column', gap: 10,
  };
  const standardFace = {
    ...faceBase,
    background: C.surface,
    border: `1.75px solid ${C.ink}`,
    boxShadow: SH.card,
  };
  const priorityFace = {
    ...faceBase,
    background: C.redDark,
    border: `1.75px solid ${C.redDark}`,
    color: C.onPriority,
    boxShadow: SH.cardPriority,
  };
  const faceStyle = priority ? priorityFace : standardFace;

  // Bookmark — pure icon, no box. Color flips to red when saved.
  // Priority surface keeps white-on-redDark inverse.
  const bookmarkBtnStyle = priority ? {
    background: 'transparent',
    color: isBookmarked ? C.onPriority : C.onPriorityMuted,
    border: 'none',
  } : {
    background: 'transparent',
    color: isBookmarked ? C.red : C.ink,
    border: 'none',
  };

  // Week badge (only shown in Saved view) — invert for priority
  const weekBadgeStyle = priority ? {
    color: C.onPriority,
    background: 'rgba(255,255,255,0.1)',
    border: `1.5px solid ${C.onPriorityLine}`,
  } : {
    color: C.ink,
    background: C.surfaceAlt,
    border: `1.5px solid ${C.lineSoft}`,
  };

  // Body / source / divider colors
  const bodyColor    = priority ? C.onPriorityMuted : C.inkBody;
  const headlineColor = priority ? C.onPriority : C.ink;
  const sourceColor  = priority ? C.onPriorityMuted : C.muteSoft;
  const dividerColor = priority ? C.onPriorityLine : C.lineSoft;

  return (
    <div className="tile-outer" onClick={() => { if (!disableFlip) setFlipped(f => !f); }}>
      <div className="tile-inner" style={{ transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
        {/* FRONT */}
        <div className="tile-face tile-front" style={faceStyle}>
          {/* Bookmark — pure icon, pinned to the top-right corner. Click area extends via padding. */}
          <button onClick={handleBookmark} title={isBookmarked ? 'Remove from saved' : 'Save this insight'}
            className="no-print tile-bookmark"
            style={{
              position: 'absolute', top: 10, right: 10, zIndex: 2,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              padding: 6, cursor: 'pointer', transition: 'all 0.2s ease',
              ...bookmarkBtnStyle,
            }}>
            <Bookmark size={20} strokeWidth={2.25}
              fill={isBookmarked ? 'currentColor' : 'none'} />
          </button>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', paddingRight: 38 }}>
            {weekBadge && (
              <span style={{
                display: 'inline-flex', alignItems: 'center',
                padding: '3px 9px', fontSize: 9, fontWeight: 700,
                letterSpacing: '0.10em', textTransform: 'uppercase', lineHeight: 1,
                fontFamily: FONT_BODY,
                borderRadius: 999,
                ...weekBadgeStyle,
              }}>{weekBadge}</span>
            )}
            {insight.tags.map((t, i) => <Tag key={i} label={t} invert={priority} />)}
          </div>
          <h3 className="tile-headline" style={{
            margin: 0,

          <div style={{

            marginTop: 'auto',
          }}>
            {insight.source}
          </div>
          <div style={{ marginTop: 4 }}>

}

// COMPETITIVE FLAGS — TACTICAL DARK
// Black panel container, white cards with a red left tab stroke.
// Activity type replaces the old High/Medium/Low priority. Type is read from
// flag.type when present, otherwise inferred from note text via the classifier.
// Flag note text is capped at 10 rendered lines (CSS clamp safety net);
// authors should summarize during the intel pull rather than rely on the clamp.

// Activity-type classifier — heuristic fallback when flag.type isn't set.
function classifyActivityType(note) {
  const n = (note || '').toLowerCase();
  if (/\b(launch|launches|launching|product|series|rolls out|unveils|debut)\b/.test(n)) return 'Product';
  if (/\b(contract|deal|wins|won|awarded|installs?|installation|signed|partnership with|equipped)\b/.test(n)) return 'Contract';
  if (/\b(ceo|cfo|coo|chief|named|appoints?|appointed|joins as|hires|steps down|departs)\b/.test(n)) return 'Leadership';
  if (/\b(revenue|earnings|raises?|raised|funding|ipo|acquisition|acquires?|acquired|valuation|\$\d|€\d|£\d)\b/.test(n)) return 'Financial';
  if (/\b(partner|partnership|alliance|joins forces|collaborat)\b/.test(n)) return 'Partnership';
  return 'Strategic';
}

};

// -------------------- MAIN --------------------
function IntelBrief() {
  const [selectedId, setSelectedId] = useState(BRIEFS[0].id);
  const [filter, setFilter] = useState('all');
  const [weekPickerOpen, setWeekPickerOpen] = useState(false);
  const [regionPickerOpen, setRegionPickerOpen] = useState(false);
  const [langBannerDismissed, setLangBannerDismissed] = useState(true); // default true; effect below sets to false if banner should show

  // -------- Language-detection nudge --------
  // On first visit, if browser language matches another region but the user is on this one,
  // surface a one-time banner suggesting the regional dashboard. Stored in localStorage so
  // the banner does not reappear after dismissal.
  const [suggestedRegion, setSuggestedRegion] = useState(null);
  useEffect(() => {
    try {
      if (typeof navigator === 'undefined') return;
      const dismissed = lsGet('lfhs_lang_banner_dismissed_v1', false);
      if (dismissed) return;
      const browserLang = (navigator.language || navigator.userLanguage || '').toString();
      if (!browserLang) return;
      // Find any OTHER region whose languageMatches contains this browser language
      const match = REGIONS.find(r => r.id !== REGION && r.languageMatches.some(l => browserLang.startsWith(l)));
      if (match) {
        setSuggestedRegion(match);
        setLangBannerDismissed(false);

    setRatings(prev => {
      const next = { ...prev };
      if (prev[id] === value) delete next[id]; // toggle off if same value clicked
      else next[id] = value;
      lsSet(LS_RATINGS, next);
      return next;
    });
  };

  useEffect(() => { setBriefRatings(lsGet('lfhs_brief_level_ratings_v1', {})); }, []);
  const briefRating = briefRatings[selectedId];

    setBriefRatings(prev => {
      const next = { ...prev };

      return next;

                boxShadow: SH.modal, overflow: 'hidden',
              }}>
                {BRIEFS.map(b => (
                  <button key={b.id} onClick={() => { setSelectedId(b.id); setWeekPickerOpen(false); setFilter('all'); }}
                    className="week-option"
                    style={{
                      display: 'block', width: '100%', textAlign: 'left',
                      padding: '14px 18px', background: b.id === selectedId ? C.surfaceAlt : 'transparent',
                      border: 'none', borderBottom: `1px solid ${C.lineSoft}`,
                      fontFamily: FONT_BODY,
                      cursor: 'pointer', transition: 'background 0.15s',
                    }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: C.ink }}>{b.issue}</span>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        {b.sampleData && (
                          <span style={{
                            fontSize: 8.5, fontWeight: 700, letterSpacing: '0.10em', textTransform: 'uppercase',
                            padding: '3px 7px', borderRadius: 4,
                            background: '#FEF6E7', color: '#8A5A10', border: '1px solid #F4C758',
                          }}>Sample</span>
                        )}
                        {b.id === selectedId && (
                          <span style={{
                            fontSize: 9, color: C.red, fontWeight: 700,
                            letterSpacing: '0.10em', textTransform: 'uppercase',
                          }}>● Current</span>
                        )}
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: C.mute, marginTop: 4 }}>{b.weekRange}</div>
                  </button>
                ))}
              </div>
            )}
          </div>
          </div>
          {/* Helpful row — moved up into the hero so the title bottom aligns with the rating row.
              Hidden on mobile via the media query (skim mode, no rating). */}
          <div className="no-print hero-helpfulness" style={{
            display: 'flex', alignItems: 'center', gap: 12,
          }}>
            <span style={{
              fontFamily: FONT_BODY,
              fontSize: 12.5, fontWeight: 500, color: C.ink,
            }}>
              {briefRating ? 'Thanks for the feedback' : 'Was this brief helpful?'}
            </span>
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => handleBriefRate('up')} title="Yes, useful"
                className="icon-btn"
                style={{
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  width: 40, height: 36, padding: 0,
                  background: briefRating === 'up' ? C.red : C.surface,
                  border: `1.5px solid ${briefRating === 'up' ? C.red : C.ink}`,
                  borderRadius: 9,
                  cursor: 'pointer', transition: 'all 0.2s ease',
                }}>
                <ThumbsUp size={16} strokeWidth={2}
                  fill={briefRating === 'up' ? C.onPriority : 'none'}
                  color={briefRating === 'up' ? C.onPriority : C.ink} />
              </button>
              <button onClick={() => handleBriefRate('down')} title="Not useful"
                className="icon-btn"
                style={{
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  width: 40, height: 36, padding: 0,
                  background: briefRating === 'down' ? C.ink : C.surface,
                  border: `1.5px solid ${C.ink}`,
                  borderRadius: 9,
                  cursor: 'pointer', transition: 'all 0.2s ease',
                }}>
                <ThumbsDown size={16} strokeWidth={2}
                  fill={briefRating === 'down' ? C.surface : 'none'}
                  color={briefRating === 'down' ? C.surface : C.ink} />
              </button>
            </div>
          </div>
          </div>
        </div>
      </div>

      {/* ============ SAMPLE DATA BANNER ============ */}
      {brief.sampleData && (
        <div style={{ maxWidth: 1180, margin: '0 auto', padding: '0 32px 14px' }}>
          <div style={{
            background: '#FEF6E7', border: '1.5px solid #F4C758',
            borderRadius: 9, padding: '12px 16px',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{
              fontFamily: FONT_BODY,
              fontSize: 9, fontWeight: 700, letterSpacing: '0.10em', textTransform: 'uppercase', lineHeight: 1,
              padding: '4px 9px', borderRadius: 4,
              background: '#B8791A', color: '#FFFFFF',
            }}>
              Sample
            </span>
            <span style={{
              fontFamily: FONT_BODY,
              fontSize: 12, color: '#8A5A10', lineHeight: 1.55,
            }}>
              Archive view. Content is illustrative from the prototype period. Live sourced intelligence begins with Issue №16.
            </span>
          </div>
        </div>
      )}

      {/* ============ ONE BIG IDEA ============ */}
      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '4px 32px 0' }}>
        <div className="fade-in" style={{
          background: C.surface,
          color: C.ink,
          border: `1.75px solid ${C.red}`,
          borderRadius: 15, padding: '26px 28px',
          boxShadow: SH.card,
          position: 'relative', overflow: 'hidden',
        }}>
          {/* Red leading bar — keeps the visual anchor without flooding the card */}
          <div style={{
            position: 'absolute', top: 0, left: 0, bottom: 0, width: 6,
            background: C.red,
          }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, paddingLeft: 8 }}>
            <Target size={14} strokeWidth={2.5} color={C.red} />
            <span style={{
              fontFamily: FONT_BODY,
              fontSize: 10.5, fontWeight: 700, letterSpacing: '0.10em',
              textTransform: 'uppercase', color: C.red,
            }}>
              One Big Idea
            </span>
          </div>
          <h3 style={{
            margin: '0 0 12px 0', paddingLeft: 8,
            fontFamily: FONT_DISPLAY, fontWeight: 400,
            fontSize: 24, lineHeight: 1.12, letterSpacing: '0.006em',
            color: C.ink,
          }}>
            {brief.oneBigIdea.headline}
          </h3>
          <p className="one-big-body" style={{
            margin: 0, paddingLeft: 8, fontFamily: FONT_BODY,
            fontSize: 14.5, lineHeight: 1.55, color: C.inkBody,
          }}>
            {brief.oneBigIdea.body}
          </p>
        </div>
      </div>

      {/* ============ FILTER ============ */}
      <div className="content-wrap" style={{ maxWidth: 1180, margin: '0 auto', padding: '36px 32px 44px' }}>
        <div className="no-print filter-row" style={{
          display: 'flex', alignItems: 'center', gap: 6,
          marginBottom: 36, flexWrap: 'wrap',
        }}>
          <span className="filter-label" style={{
            fontFamily: FONT_BODY,
            fontSize: 10, fontWeight: 700, letterSpacing: '0.10em', textTransform: 'uppercase',
            color: C.muteSoft, marginRight: 4, display: 'flex', alignItems: 'center', gap: 5,
          }}>
            <Filter size={10} strokeWidth={2} /> Filter
          </span>

          {/* Vertical dropdown — native select for mobile-OS picker + accessibility.
              Styled to read like a chip so it sits naturally in the row. */}
          {(() => {
            const verticalActive = filter === 'all' || VERTICALS_META.some(v => v.id === filter);
            const selectValue = verticalActive ? filter : 'all';
            return (
              <div style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
                <select
                  value={selectValue}
                  onChange={(e) => setFilter(e.target.value)}
                  className={`filter-chip-select ${verticalActive ? 'active' : ''}`}
                  style={{
                    appearance: 'none', WebkitAppearance: 'none', MozAppearance: 'none',
                    fontFamily: FONT_BODY,
                    fontSize: 9.5, fontWeight: 700,
                    letterSpacing: '0.06em', textTransform: 'uppercase',
                    padding: '5px 24px 5px 10px',
                    border: `1.5px solid ${verticalActive ? C.ink : C.borderHi}`,
                    borderRadius: 999,
                    background: verticalActive ? C.ink : 'transparent',
                    color: verticalActive ? C.surface : C.ink,
                    cursor: 'pointer', outline: 'none', minWidth: 0,
                  }}
                >
                  <option value="all">All Verticals</option>
                  {VERTICALS_META.map(v => (
                    <option key={v.id} value={v.id}>{v.name}</option>
                  ))}
                </select>
                <ChevronDown
                  size={11} strokeWidth={2.5}
                  color={verticalActive ? C.surface : C.ink}
                  style={{ position: 'absolute', right: 8, pointerEvents: 'none' }}
                />
              </div>
            );
          })()}

          {/* Three remaining chips: Saved, Trending, Competitive */}
          {[
            { id: 'saved',       label: 'Saved',       icon: Bookmark, count: bookmarks.length },
            { id: 'trending',    label: 'Trending',    icon: Flame,    count: null },
            { id: 'competitive', label: 'Competitive', icon: Shield,   count: null, scrollTo: 'competitive-flags-section' },
          ].map(chip => {
            const active = filter === chip.id;
            const ChipIcon = chip.icon;
            const handleChipClick = () => {
              if (chip.scrollTo) {
                if (filter === 'saved') setFilter('all');
                setTimeout(() => {
                  const el = document.getElementById(chip.scrollTo);
                  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, filter === 'saved' ? 80 : 0);
                return;
              }
              setFilter(chip.id);
            };
            return (
              <button key={chip.id} onClick={handleChipClick}
                className={`filter-chip ${active ? 'active' : ''}`}
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: 5,
                  padding: '5px 10px',
                  fontFamily: FONT_BODY,
                  fontSize: 9.5, fontWeight: 700,
                  letterSpacing: '0.06em', textTransform: 'uppercase',
                  border: `1.5px solid ${active ? C.ink : C.borderHi}`,
                  borderRadius: 999,
                  background: active ? C.ink : 'transparent',
                  color: active ? C.surface : C.ink,
                  cursor: 'pointer', whiteSpace: 'nowrap',
                  transition: 'all 0.2s',
                }}>
                {ChipIcon && <ChipIcon size={10} strokeWidth={2.5}
                  fill={chip.id === 'saved' && bookmarks.length > 0 ? (active ? C.surface : C.red) : 'none'}
                  color={active ? C.surface : (chip.id === 'saved' && bookmarks.length > 0 ? C.red : C.ink)} />}
                {chip.label}
                {chip.count !== null && chip.count > 0 && (
                  <span style={{
                    fontFamily: FONT_BODY,
                    fontSize: 9, fontWeight: 700,
                    padding: '1px 6px', borderRadius: 999,
                    background: active ? 'rgba(255,255,255,0.18)' : C.surface,
                    color: active ? C.surface : C.red,
                    border: active ? '1px solid rgba(255,255,255,0.25)' : `1px solid ${C.red}`,
                    marginLeft: 1,
                  }}>{chip.count}</span>
                )}
              </button>
            );
          })}
        </div>

        {/* SAVED VIEW */}
        {isSavedView && (
          <SavedInsightsView
            bookmarks={bookmarks}
            ratings={ratings}
            onRate={handleRate}
            onUnsave={handleUnsave}
          />
        )}

        {/* TRENDING SECTION — moved above verticals so reps see cross-vertical patterns first */}
        {showTrending && trendingCapped.length > 0 && (
          <section style={{ marginTop: 0, marginBottom: 32 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
              <div style={{
                width: 32, height: 32, borderRadius: 9,
                background: C.surface, color: C.red,
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                border: `1.75px solid ${C.red}`,
              }}>
                <Flame size={15} strokeWidth={2.5} color={C.red} />
              </div>
              <h2 style={{
                margin: 0,
                fontFamily: FONT_DISPLAY, fontWeight: 400,
                fontSize: 22, lineHeight: 1.10, letterSpacing: '0.01em',
                color: C.red,
              }}>Trending</h2>
              <span style={{
                fontFamily: FONT_BODY,
                fontSize: 10, fontWeight: 700, letterSpacing: '0.10em', textTransform: 'uppercase',
                padding: '3px 10px', borderRadius: 999,
                background: 'transparent', color: C.ink,
                border: `1.5px solid ${C.borderHi}`,
              }}>{trendingCapped.length} {trendingCapped.length === 1 ? 'pattern' : 'patterns'}</span>
              <span style={{
                fontFamily: FONT_BODY,
                fontSize: 12, color: C.mute, fontStyle: 'italic',
              }}>
                Cross-vertical patterns from this and recent briefs.
              </span>
            </div>
            <div className={`tile-grid tile-grid-${Math.min(trendingCapped.length, 3)}`}>
              {trendingCapped.map((t, i) => <TrendingTile key={i} item={t} />)}
            </div>
          </section>
        )}

        {/* VERTICAL SECTIONS */}
        {showVerticals && visibleVerticals.map(meta => (
          <VerticalSection
            key={meta.id}
            meta={meta}
            insights={brief.verticals[meta.id]}
            briefId={brief.id}
            bookmarkIds={bookmarkIds}
            ratings={ratings}
            onBookmark={handleBookmark}
            onRate={handleRate}
          />
        ))}

        {/* (Trending section formerly here — now rendered above verticals) */}

        {/* COMPETITIVE FLAGS */}
        {showFlags && (
        <section id="competitive-flags-section" style={{ marginTop: 20, marginBottom: 32, scrollMarginTop: 80 }}>
          <CompetitiveFlags flags={brief.flags} />
        </section>
        )}

        {/* ONE BIG IDEA — now rendered at top of brief, removed from this position */}

        {/* METADATA */}
        {showMetadata && (
        <section>
          <div style={{
            background: C.surface, border: `1.5px solid ${C.borderHi}`,
            borderRadius: 15, padding: '18px 22px',
            boxShadow: SH.card,
          }}>
            <div style={{
              fontFamily: FONT_BODY,
              fontSize: 10.5, fontWeight: 700, letterSpacing: '0.10em', textTransform: 'uppercase',
              color: C.mute, marginBottom: 12,
            }}>
              Brief Metadata
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 14 }}>
              {[
                ['Date range', brief.weekRange],
                ['Verticals', String(VERTICALS_META.length)],
                ['Competitors', '8'],
                ['Processed', brief.metadata.processed],
                ['Delivered', brief.metadata.delivered],
              ].map(([label, val], i) => (
                <div key={i}>
                  <div style={{
                    fontFamily: FONT_BODY,
                    fontSize: 9.5, color: C.mute, fontWeight: 700,
                    letterSpacing: '0.10em', textTransform: 'uppercase', marginBottom: 4,
                  }}>{label}</div>
                  <div style={{
                    fontFamily: FONT_BODY,
                    fontSize: 13, fontWeight: 600, color: C.ink,
                  }}>{val}</div>
                </div>
              ))}
            </div>
            <div style={{
              fontFamily: FONT_BODY,
              fontSize: 11.5, color: C.mute, fontStyle: 'italic',
              marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.lineSoft}`,
            }}>
              {brief.metadata.dedup}
            </div>
          </div>
          <div style={{
            textAlign: 'center', marginTop: 22,
            fontFamily: FONT_BODY,
            fontSize: 10, color: C.muteSoft, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 700,
          }}>
            Life Fitness / Hammer Strength · Competitive Intelligence · Confidential
          </div>
        </section>
        )}
      </div>
    </div>
  );
}

const rootEl = document.getElementById('root');
const initialLoader = document.getElementById('initial-loader');
if (initialLoader) initialLoader.remove();
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(IntelBrief));
</script>
</body>
</html>
